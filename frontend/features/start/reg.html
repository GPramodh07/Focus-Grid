<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Focus Grid</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../styles/start/home.css">
    <link rel="stylesheet" href="../../styles/start/reg.css">
</head>

<body>
    <div class="reg-container">
        <h2>Join Us</h2>
        <p>Create an account to start managing your tasks.</p>

        <form id="regForm">
            <div class="input-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your full name" required>
            </div>

            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Choose a username" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Create a password" required>
            </div>

            <button type="submit" class="btn btn-primary reg-btn">Sign Up</button>
        </form>

        <div class="reg-links">
            <p>Already have an account? <a href="login.html">Sign in</a></p>
        </div>
    </div>

    <script src="../../config.js"></script>
    <script src="../../js/start/reg.js"></script>
</body>

</html>
