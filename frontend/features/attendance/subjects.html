<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance - Focus Grid</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../styles/start/home.css">
    <link rel="stylesheet" href="../../styles/start/dashboard.css">
    <link rel="stylesheet" href="../../styles/attendance/subject.css">
    <link rel="stylesheet" href="../../styles/start/updateprofile.css">
</head>

<body>
    <!-- Top Header -->
    <header class="top-header glass-panel">
        <div class="header-left">
            <div class="header-logo">
                <h2>Focus Grid</h2>
            </div>
            <button id="sidebarToggle" class="menu-toggle-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
        </div>

        <div class="header-greeting">
            <h3>Attendance</h3>
            <div class="motivating-line">
                ✨ "The secret of getting ahead is getting started."
            </div>
        </div>

        <div class="user-profile">
            <div class="user-info">
                <span class="name" id="headerName">Boss User</span>
                <span class="username" id="headerUsername">@boss_user</span>
            </div>
            <div class="avatar" id="headerAvatar">BU</div>
        </div>
    </header>

    <div class="dashboard-container">
        <!-- Sidebar / Menu -->
        <aside class="sidebar glass-panel">
            <div class="sidebar-header">
                <h2 class="sidebar-logo">Focus Grid</h2>
                <button class="sidebar-close-btn" aria-label="Close sidebar">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div class="sidebar-nav-container">
                <nav class="sidebar-menu">
                    <a href="../start/dashboard.html" class="menu-item">Dashboard</a>
                    <a href="../plan_day/tasks.html" class="menu-item">Plan Day</a>
                    <a href="subjects.html" class="menu-item active">Attendance</a>
                    <!-- <a href="#" class="menu-item">Focus Mode</a>
                    <a href="#" class="menu-item">Progress</a> -->
                    <a href="../time_table/table.html" class="menu-item">Time Table</a>
                </nav>
                <div class="sidebar-footer">
                    <a href="../start/login.html" class="menu-item logout">Logout</a>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Dashboard Body / Blocks -->
            <div class="dashboard-body">
                <div class="top-controls glass-panel">
                    <div class="controls-left">
                        <h3>Subjects</h3>
                    </div>
                    <div class="controls-right">
                        <button class="btn btn-primary" id="addSubjectBtn">+ Add Subject</button>
                    </div>
                </div>

                <div class="attendance-list" id="attendanceList">
                    <!-- Dynamic subjects will be injected here -->
                </div>
            </div>
        </main>
    </div>

    <!-- Subject Modal (Add/Edit) -->
    <div class="modal-overlay" id="subjectModal" style="display: none;">
        <div class="modal-content glass-panel">
            <div class="modal-header">
                <h3 id="subjectModalTitle">Add New Subject</h3>
                <button class="close-modal" id="closeSubjectModal">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div id="subjectFormError" class="form-error"></div>
            <form id="subjectForm" class="subject-form">
                <input type="hidden" id="subjectId">
                <div class="form-group">
                    <label>Subject Name</label>
                    <input type="text" id="subjectName" placeholder="Enter subject name..." required>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="deleteSubjectBtn" style="display: none;">Delete</button>
                    <button type="submit" class="btn btn-primary">Save Subject</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../../js/attendance/subjects.js"></script>
    <script src="../../js/start/updateprofile.js"></script>
</body>

</html>
