<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Routines - Focus Grid</title>
	<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="../../styles/start/home.css">
	<link rel="stylesheet" href="../../styles/start/dashboard.css">
	<link rel="stylesheet" href="../../styles/plan_day/routines.css">
</head>

<body>
	<header class="top-header glass-panel">
		<div class="header-left">
			<div class="header-logo">
				<h2>Focus Grid</h2>
			</div>
			<button id="sidebarToggle" class="menu-toggle-btn" aria-label="Toggle sidebar">
				<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
					stroke-linecap="round" stroke-linejoin="round">
					<line x1="3" y1="12" x2="21" y2="12"></line>
					<line x1="3" y1="6" x2="21" y2="6"></line>
					<line x1="3" y1="18" x2="21" y2="18"></line>
				</svg>
			</button>
		</div>

		<div class="header-greeting">
			<h3 id="pageTitle">Plan Your Day</h3>
			<div class="motivating-line">
				✨ Design routines once and execute them with clarity every day.
			</div>
		</div>

		<div class="user-profile">
			<div class="user-info">
				<span class="name" id="headerName">Boss User</span>
				<span class="username" id="headerUsername">@boss_user</span>
			</div>
			<div class="avatar" id="headerAvatar">BU</div>
		</div>
	</header>

	<div class="dashboard-container">
		<aside class="sidebar glass-panel">
		<div class="sidebar-header">
			<h2 class="sidebar-logo">Focus Grid</h2>
			<button class="sidebar-close-btn" aria-label="Close sidebar">
				<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
			</button>
		</div>
		<div class="sidebar-nav-container">
				<nav class="sidebar-menu">
					<a href="../start/dashboard.html" class="menu-item">Dashboard</a>
					<a href="tasks.html" class="menu-item active">Plan Day</a>
					<a href="../attendance/subjects.html" class="menu-item">Attendance</a>
					<!-- <a href="#" class="menu-item">Focus Mode</a>
					<a href="#" class="menu-item">Progress</a> -->
					<a href="../time_table/table.html" class="menu-item">Time Table</a>
				</nav>
				<div class="sidebar-footer">
					<a href="../start/login.html" class="menu-item logout">Logout</a>
				</div>
			</div>
		</aside>

		<main class="main-content">
			<div class="dashboard-body">
				<div class="top-controls glass-panel">
					<div class="controls-left">
						<h3>Routines</h3>
					</div>
					<div class="controls-right">
						<button class="btn btn-secondary" id="tasksBtn">Tasks</button>
						<button class="btn btn-primary" type="button" id="addRoutineBtn">+ Add Routine</button>
					</div>
				</div>

				<section class="routine-grid" id="routineGrid" aria-label="Routine cards">
					<div class="routine-empty glass-panel" id="routineEmptyState">No routines yet. Add your first routine.</div>
				</section>
			</div>
		</main>
	</div>

	<div class="modal-overlay" id="routineModal" style="display: none;">
		<div class="modal-content glass-panel">
			<div class="modal-header">
				<h3 id="routineModalTitle">Add Routine</h3>
				<button class="close-modal" id="closeRoutineModal" type="button" aria-label="Close">
					<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
						<line x1="18" y1="6" x2="6" y2="18"></line>
						<line x1="6" y1="6" x2="18" y2="18"></line>
					</svg>
				</button>
			</div>
			<form id="routineForm" class="task-form">
				<input type="hidden" id="routineId">
				<div id="routineFormError" class="form-inline-error" role="alert" aria-live="polite"></div>
				<div class="form-group">
					<label for="routineTitle">Title</label>
					<input type="text" id="routineTitle" required>
				</div>
				<div class="row">
					<div class="form-group">
						<label for="routineStartTime">Start Time</label>
						<input type="time" id="routineStartTime" required>
					</div>
					<div class="form-group">
						<label for="routineEndTime">End Time</label>
						<input type="time" id="routineEndTime" required>
					</div>
				</div>
				<div class="modal-footer">
					<button type="button" class="btn btn-secondary" id="cancelRoutineBtn">Cancel</button>
					<button type="submit" class="btn btn-primary">Save Routine</button>
				</div>
			</form>
		</div>
	</div>

	<script src="../../js/plan_day/routines.js"></script>
</body>

</html>
