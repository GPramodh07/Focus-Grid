<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan Your Day - Focus Grid</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../styles/start/home.css">
    <link rel="stylesheet" href="../../styles/start/dashboard.css">
    <link rel="stylesheet" href="../../styles/plan_day/tasks.css">
</head>

<body>
    <!-- Top Header -->
    <header class="top-header glass-panel">
        <div class="header-left">
            <div class="header-logo">
                <h2>Focus Grid</h2>
            </div>
            <button id="sidebarToggle" class="menu-toggle-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
        </div>

        <div class="header-greeting">
            <h3 id="pageTitle">Plan Your Day</h3>
            <div class="motivating-line">
                ✨ Organize your tasks and build powerful routines.
            </div>
        </div>

        <div class="user-profile">
            <div class="user-info">
                <span class="name" id="headerName">Boss User</span>
                <span class="username" id="headerUsername">@boss_user</span>
            </div>
            <div class="avatar" id="headerAvatar">BU</div>
        </div>
    </header>

    <div class="dashboard-container">
        <!-- Sidebar / Menu -->
        <aside class="sidebar glass-panel">
            <div class="sidebar-header">
                <h2 class="sidebar-logo">Focus Grid</h2>
                <button class="sidebar-close-btn" aria-label="Close sidebar">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div class="sidebar-nav-container">
                <nav class="sidebar-menu">
                    <a href="../start/dashboard.html" class="menu-item">Dashboard</a>
                    <a href="#" class="menu-item active">Plan Day</a>
                    <a href="../attendance/subjects.html" class="menu-item">Attendance</a>
                    <!-- <a href="#" class="menu-item">Focus Mode</a>
                    <a href="#" class="menu-item">Progress</a> -->
                    <a href="../time_table/table.html" class="menu-item">Time Table</a>
                </nav>
                <div class="sidebar-footer">
                    <a href="../start/login.html" class="menu-item logout">Logout</a>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="dashboard-body">
                <!-- Top Controls -->
                <div class="top-controls glass-panel">
                    <div class="controls-left">
                        <h3>Task Calendar</h3>
                    </div>
                    <div class="controls-right">
                        <button class="btn btn-secondary" id="routineBtn">Routines</button>
                        <button class="btn btn-primary" type="button" id="addTaskBtn">+ Add Task</button>
                    </div>
                </div>

                <!-- Calendar View -->
                <div class="calendar-container">
                    <div class="calendar-header glass-panel">
                        <div class="month-nav">
                            <button class="nav-btn" id="prevMonth">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                            </button>
                            <div class="month-display" id="monthDisplay">March 2026</div>
                            <button class="nav-btn" id="nextMonth">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                            </button>
                        </div>
                    </div>

                    <div class="calendar-grid glass-panel" id="calendarGrid">
                        <!-- Calendar will be injected here via JS -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Task List Modal (Enhanced UI) -->
    <div class="modal-overlay" id="taskModal">
        <div class="modal-content-large glass-panel">
            <div class="modal-header">
                <div class="modal-title-section">
                    <h3>Tasks for <span id="modalDateDisplay">March 10</span></h3>
                    <p id="taskCountDisplay" class="task-count">0 tasks</p>
                </div>
                <button class="close-modal" id="closeTaskModal">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            
            <div class="task-list-container-large">
                <div id="taskListUI" class="task-list-large">
                    <!-- Enhanced task cards will be injected here -->
                </div>
            </div>
            
            <div class="modal-footer-large">
                <button type="button" class="btn btn-primary" id="modalAddTaskBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    Add Task
                </button>
            </div>
        </div>
    </div>

    <!-- Task Form Modal (Add / Edit) -->
    <div class="modal-overlay" id="taskFormModal" style="display: none;">
        <div class="modal-content glass-panel">
            <div class="modal-header">
                <h3 id="formModalTitle">Add New Task</h3>
                <button class="close-modal" id="closeTaskFormModal">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <form id="taskForm" class="task-form">
                <input type="hidden" id="taskId">
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="taskTitle" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="taskDesc" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="taskDate" required>
                </div>
                <div class="row">
                    <div class="form-group">
                        <label>Start Time</label>
                        <input type="time" id="taskStart">
                    </div>
                    <div class="form-group">
                        <label>End Time</label>
                        <input type="time" id="taskEnd">
                    </div>
                </div>
                <div class="form-group" id="statusGroup" style="display: none;">
                    <label>Status</label>
                    <select id="taskStatus">
                        <option value="pending">Pending</option>
                        <option value="missed">Missed</option>
                        <option value="completed">Completed</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="deleteTaskBtn" style="display: none;">Delete</button>
                    <button type="submit" class="btn btn-primary">Save Task</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../../js/plan_day/tasks.js"></script>
</body>

</html>
